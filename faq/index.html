<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WarrantyPing</title>
    <base href="/warrantyping-page/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link href="WarrantyPing.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- SPA GitHub Pages: URL von /?/privacy wieder nach /privacy umschreiben -->
    <script type="text/javascript">
        (function (l) {
            if (l.search && l.search.length > 1 && l.search[1] === '/') {
                var decoded = l.search
                    .slice(1)
                    .split('&')
                    .map(function (s) { return s.replace(/~and~/g, '&'); })
                    .join('?');

                // Robust gegen Pfade mit/ohne trailing slash (z.B. /privacy/)
                if (decoded.length > 1 && decoded.endsWith('/')) {
                    decoded = decoded.slice(0, -1);
                }

                var basePath = l.pathname;
                if (basePath.endsWith('/')) {
                    basePath = basePath.slice(0, -1);
                }

                window.history.replaceState(null, null, basePath + decoded + l.hash);
            }
        }(window.location));
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
